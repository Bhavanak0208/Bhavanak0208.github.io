content: |
  I am [[Bhavana K]], a PhD Research Scholar at [IIT Bombay](https://www.iitb.ac.in), currently associated with [Microwave Remote Sensing lab](https://mrslab.in/) as a dual-degree (M.Tech. + Ph.D.) student in Geoinformatics and Natural Resources Engineering.

  My research focuses on the spatiotemporal analysis of [[urban vegetation dynamics]] using SAR polarimetry. I also work on the fusion of multi-temporal SAR and optical datasets to analyze and track [[urban ecological shifts]].

  My research interests include SAR polarimetry, urban vegetation mapping, [[green urban dynamics]], and data fusion.
